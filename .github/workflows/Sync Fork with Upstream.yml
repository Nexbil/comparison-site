name: Sync Fork with Upstream and Increment Release ID

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    if: startsWith(github.repository, 'Nexbil/') &&
      !contains(github.event.head_commit.message, 'Release -')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH key for Git
        env:
          FORK_SYNC_PRIVATE_KEY: ${{ secrets.FORK_SYNC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$FORK_SYNC_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add GitHub to known hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Increment Release ID
        run: |
          # Check if the release-id.txt file exists
          if [[ -f release-id.txt ]]; then
            # Read the current release ID
            current_release_id=$(cat release-id.txt)
            # Increment the release ID by 1
            new_release_id=$((current_release_id + 1))
          else
            # If the file does not exist, start with release ID 1
            new_release_id=1
          fi
          # Write the new release ID back to the file
          echo $new_release_id > release-id.txt
          echo "RELEASE_ID=$new_release_id" >> $GITHUB_ENV

      - name: Commit and Push Incremented Release ID to Upstream via SSH
        run: |
          git config --global user.name "gowithnexbil"
          git config --global user.email "gowithnexbil@gmail.com"
          git add release-id.txt
          git commit -m "Release - $RELEASE_ID"
          git push git@github.com:${{ github.repository }}.git HEAD:main

      - name: Sync Fork via GitHub API
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          repo_name="${GITHUB_REPOSITORY#Nexbil/}"
          curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${GH_PAT}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/gowithnexbil/${repo_name}/merge-upstream \
          -d '{"branch":"main"}'